<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Signature Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="form-container">
            <h1>Create Your Signature</h1>
            <form id="signature-form">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="title" placeholder="Job Title" required>
                <input type="text" id="department" placeholder="Department">
                <input type="text" id="company" placeholder="Company Name" required>
                <input type="tel" id="phone" placeholder="Phone Number">
                <input type="email" id="email" placeholder="Email Address">
                <input type="url" id="website" placeholder="Website">
                <input type="url" id="profile-pic" placeholder="Profile Picture URL">
                <input type="url" id="company-logo" placeholder="Company Logo URL">
                <button type="submit">Create Signature</button>
            </form>
        </div>
        <div class="preview-container">
            <h2>Signature Preview</h2>
            <div id="signature-preview"></div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="main.js"></script>
</body>
</html>
